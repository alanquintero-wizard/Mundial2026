<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10; --surface:#131720; --surface2:#1a2030; --surface3:#222840;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0f2f8; --text2:#8892a8; --text3:#454e65;
  --gold:#f5c842; --gold-dim:rgba(245,200,66,0.12);
  --green:#22c55e; --green-dim:rgba(34,197,94,0.12);
  --red:#ef4444; --red-dim:rgba(239,68,68,0.12);
  --blue:#3b82f6;
  --r:10px; --rs:6px;
  --font:'Inter',sans-serif; --display:'Barlow Condensed',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100dvh;-webkit-font-smoothing:antialiased;}

/* HEADER */
.header{background:linear-gradient(135deg,#0f1520 0%,#162040 50%,#0f1520 100%);border-bottom:1px solid rgba(245,200,66,0.2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-trophy{font-size:26px;}
.header-title{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:0.5px;color:var(--gold);line-height:1;}
.header-sub{font-size:10px;color:var(--text2);margin-top:2px;}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;font-size:12px;font-weight:600;font-family:var(--font);background:var(--gold-dim);border:0.5px solid var(--gold);border-radius:var(--rs);color:var(--gold);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.refresh-btn:active{background:rgba(245,200,66,0.2);}
.refresh-btn.loading .spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;}

/* STATUS BAR */
.status-bar{padding:6px 16px;font-size:10px;color:var(--text3);background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:6px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.status-dot.err{background:var(--red);}
.status-dot.load{background:var(--gold);animation:blink 1s infinite;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:11px 16px 12px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--font);white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* PANELS */
.panel{display:none;padding:14px 14px 56px;}
.panel.active{display:block;}

/* MATCH CARD */
.match-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;position:relative;overflow:hidden;}
.match-card.live{border-color:rgba(239,68,68,0.35);}
.match-card.live::before,.match-card.finished::before,.match-card.upcoming::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.match-card.live::before{background:var(--red);}
.match-card.finished::before{background:var(--text3);}
.match-card.upcoming::before{background:var(--gold);}
.match-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.match-group{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.match-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.match-status.live{background:var(--red-dim);color:var(--red);animation:blink 1.2s infinite;}
.match-status.finished{background:var(--surface2);color:var(--text3);}
.match-status.upcoming{background:var(--gold-dim);color:var(--gold);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.5;}}
.match-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.team{display:flex;align-items:center;gap:8px;}
.team.away{flex-direction:row-reverse;text-align:right;}
.team-flag{font-size:20px;line-height:1;}
.team-name{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);letter-spacing:0.3px;}
.team-name.winner{color:var(--gold);}
.score-box{display:flex;align-items:center;justify-content:center;gap:3px;}
.score{font-family:var(--display);font-size:26px;font-weight:800;color:var(--text);line-height:1;min-width:20px;text-align:center;}
.score.winner{color:var(--gold);}
.score-sep{font-family:var(--display);font-size:18px;color:var(--text3);}
.vs{font-family:var(--display);font-size:13px;color:var(--text3);font-weight:600;}
.match-footer{margin-top:8px;font-size:10px;color:var(--text3);}

/* COLLAPSIBLE DAY */
.day-block{margin-bottom:5px;}
.day-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;transition:background .15s;}
.day-toggle.today{border-color:rgba(245,200,66,0.35);background:rgba(245,200,66,0.06);}
.day-toggle-left{display:flex;align-items:center;gap:9px;}
.day-toggle-label{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);letter-spacing:0.3px;}
.day-toggle.today .day-toggle-label{color:var(--gold);}
.day-toggle-badge{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:20px;}
.day-toggle-right{display:flex;align-items:center;gap:7px;}
.day-toggle-scores{font-size:10px;color:var(--text2);font-family:var(--display);font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.day-chevron{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.day-chevron.open{transform:rotate(180deg);}
.day-body{display:none;padding-top:5px;}
.day-body.open{display:block;}

/* HOY header */
.hoy-date{font-family:var(--display);font-size:26px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:3px;}
.hoy-sub{font-size:11px;color:var(--text3);margin-bottom:16px;}
.section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:18px 0 8px;padding-bottom:5px;border-bottom:0.5px solid var(--border);}

/* GRUPOS */
.grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;}
.grupo-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.grupo-header{background:var(--surface2);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);}
.grupo-name{font-family:var(--display);font-size:15px;font-weight:800;color:var(--gold);letter-spacing:1px;}
.grupo-table{width:100%;border-collapse:collapse;}
.grupo-table th{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:5px 10px;text-align:right;border-bottom:0.5px solid var(--border);}
.grupo-table th:first-child{text-align:left;}
.grupo-table td{padding:8px 10px;font-size:12px;border-bottom:0.5px solid var(--border);text-align:right;}
.grupo-table td:first-child{text-align:left;}
.grupo-table tr:last-child td{border-bottom:none;}
.grupo-table tr.qualify td:first-child{border-left:2px solid var(--green);padding-left:8px;}
.team-cell{display:flex;align-items:center;gap:6px;}
.pos{font-size:10px;color:var(--text3);width:13px;flex-shrink:0;}
.flag-sm{font-size:15px;}
.t-name{font-weight:600;color:var(--text);font-family:var(--display);font-size:13px;}
.pts{font-weight:700;color:var(--text);}
.qualify-note{font-size:10px;color:var(--green);padding:5px 10px;}

/* LOADING SKELETON */
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:var(--rs);height:90px;margin-bottom:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.empty{padding:32px;text-align:center;font-size:13px;color:var(--text3);}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-trophy">🏆</div>
    <div class="header-text">
      <div class="header-title">MUNDIAL 2026</div>
      <div class="header-sub">México · EE.UU. · Canadá</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="refreshAll()" id="refresh-btn">
    <span class="spin" id="spin-icon">↻</span> Actualizar
  </button>
</div>

<div class="status-bar">
  <span class="status-dot" id="status-dot"></span>
  <span id="status-text">Cargando datos…</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('hoy',this)">⚽ Hoy</button>
  <button class="tab" onclick="switchTab('calendario',this)">📅 Calendario</button>
  <button class="tab" onclick="switchTab('resultados',this)">🏅 Resultados</button>
  <button class="tab" onclick="switchTab('grupos',this)">📊 Grupos</button>
</div>

<div class="panel active" id="panel-hoy"><div id="hoy-content"><div class="skeleton"></div><div class="skeleton"></div></div></div>
<div class="panel" id="panel-calendario"><div id="cal-content"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div></div>
<div class="panel" id="panel-resultados"><div id="res-content"><div class="skeleton"></div><div class="skeleton"></div></div></div>
<div class="panel" id="panel-grupos"><div class="grupos-grid" id="grupos-content"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div></div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const API_TOKEN = '55c6ead501de4739b60ba9dcde577df4';
const API_BASE  = 'https://api.football-data.org/v4';
const WC_ID     = 2000;

// Country code → flag emoji
const FLAGS = {
  'MEX':'🇲🇽','ZAF':'🇿🇦','KOR':'🇰🇷','CZE':'🇨🇿','CAN':'🇨🇦','BIH':'🇧🇦',
  'USA':'🇺🇸','PRY':'🇵🇾','QAT':'🇶🇦','SUI':'🇨🇭','BRA':'🇧🇷','MAR':'🇲🇦',
  'HTI':'🇭🇹','SCO':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','AUS':'🇦🇺','TUR':'🇹🇷','GER':'🇩🇪','CUW':'🇨🇼',
  'NED':'🇳🇱','JPN':'🇯🇵','CIV':'🇨🇮','ECU':'🇪🇨','SWE':'🇸🇪','TUN':'🇹🇳',
  'ESP':'🇪🇸','CPV':'🇨🇻','BEL':'🇧🇪','EGY':'🇪🇬','KSA':'🇸🇦','URU':'🇺🇾',
  'IRN':'🇮🇷','NZL':'🇳🇿','FRA':'🇫🇷','SEN':'🇸🇳','IRQ':'🇮🇶','NOR':'🇳🇴',
  'ARG':'🇦🇷','DZA':'🇩🇿','AUT':'🇦🇹','JOR':'🇯🇴','POR':'🇵🇹','COD':'🇨🇩',
  'ENG':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','CRO':'🇭🇷','GHA':'🇬🇭','PAN':'🇵🇦','UZB':'🇺🇿','COL':'🇨🇴',
};

function flag(tla) { return FLAGS[tla] || '🏳️'; }

/* ══════════════════════════════════════════
   API
══════════════════════════════════════════ */
let _remaining = 10; // track rate limit

async function apiFetch(path) {
  const target = `${API_BASE}${path}`;
  const attempts = [
    () => fetch(target, { headers: { 'X-Auth-Token': API_TOKEN } }),
    () => fetch(`https://corsproxy.io/?${encodeURIComponent(target)}`, { headers: { 'X-Auth-Token': API_TOKEN } }),
    () => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`, { headers: { 'X-Auth-Token': API_TOKEN } }),
    () => fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(target)}`, { headers: { 'X-Auth-Token': API_TOKEN } }),
  ];
  for (const attempt of attempts) {
    try {
      const res = await attempt();
      const rem = res.headers.get('X-RequestsAvailable');
      if (rem !== null) _remaining = parseInt(rem);
      if (!res.ok) continue;
      return res.json();
    } catch(e) { continue; }
  }
  throw new Error('CORS bloqueado — intenta de nuevo');
}

/* ══════════════════════════════════════════
   DATA STATE
══════════════════════════════════════════ */
let allMatches = [];
let standings  = [];
let lastUpdate = null;

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
const DAYS_ES   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function dateStr(utcStr) {
  // API returns UTC, convert to local date string YYYY-MM-DD
  const d = new Date(utcStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function localTime(utcStr) {
  return new Date(utcStr).toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
}

function formatDateLabel(str) {
  const [y,m,d] = str.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS_ES[dt.getDay()]} ${dt.getDate()} de ${MONTHS_ES[dt.getMonth()]}`;
}

/* ══════════════════════════════════════════
   MATCH CARD RENDER
══════════════════════════════════════════ */
function matchCard(m) {
  // m is raw API match object
  const status  = m.status; // SCHEDULED, TIMED, IN_PLAY, PAUSED, FINISHED
  const hs = m.score?.fullTime?.home;
  const as = m.score?.fullTime?.away;
  const htla = m.homeTeam?.tla || '';
  const atla = m.awayTeam?.tla || '';
  const hName = m.homeTeam?.name || htla;
  const aName = m.awayTeam?.name || atla;
  const hFlag = flag(htla);
  const aFlag = flag(atla);
  const group = m.group ? m.group.replace('GROUP_','Grupo ') : (m.stage || '');

  const done   = status === 'FINISHED';
  const live   = status === 'IN_PLAY' || status === 'PAUSED';
  const cardCls = done ? 'finished' : live ? 'live' : 'upcoming';

  let statusLabel, statusCls;
  if (done)       { statusLabel = 'Final';    statusCls = 'finished'; }
  else if (live)  { statusLabel = '⬤ EN VIVO'; statusCls = 'live'; }
  else            { statusLabel = localTime(m.utcDate); statusCls = 'upcoming'; }

  let hw = '', aw = '';
  if (done && hs !== null && as !== null) {
    if (hs > as) hw = 'winner';
    else if (as > hs) aw = 'winner';
  }

  const scoreBlock = (done || live) && hs !== null
    ? `<div class="score ${hw}">${hs}</div><div class="score-sep">–</div><div class="score ${aw}">${as}</div>`
    : `<div class="vs">VS</div>`;

  return `<div class="match-card ${cardCls}">
    <div class="match-meta">
      <span class="match-group">${group}</span>
      <span class="match-status ${statusCls}">${statusLabel}</span>
    </div>
    <div class="match-body">
      <div class="team home"><div class="team-flag">${hFlag}</div><div class="team-name ${hw}">${hName}</div></div>
      <div class="score-box">${scoreBlock}</div>
      <div class="team away"><div class="team-flag">${aFlag}</div><div class="team-name ${aw}">${aName}</div></div>
    </div>
    <div class="match-footer">📍 ${m.venue || m.homeTeam?.venue || '—'}</div>
  </div>`;
}

/* ══════════════════════════════════════════
   COLLAPSIBLE DAY BLOCK
══════════════════════════════════════════ */
function dayBlock(dateKey, matches, startOpen, isToday, prefix) {
  const id = `${prefix}-${dateKey}`;
  const label = formatDateLabel(dateKey);
  const n = matches.length;
  const badge = `${n} partido${n !== 1 ? 's' : ''}`;
  const todayCls = isToday ? ' today' : '';
  const openCls  = startOpen ? ' open' : '';

  // score summary for collapsed header
  const summary = matches
    .filter(m => m.status === 'FINISHED')
    .map(m => {
      const h = m.score?.fullTime?.home;
      const a = m.score?.fullTime?.away;
      return `${flag(m.homeTeam?.tla)}${h}–${a}${flag(m.awayTeam?.tla)}`;
    }).join('  ');

  return `<div class="day-block">
    <button class="day-toggle${todayCls}" onclick="toggleDay('${id}')">
      <div class="day-toggle-left">
        <span class="day-toggle-label">${isToday ? '🔴 ' : ''}${label}</span>
        <span class="day-toggle-badge">${badge}</span>
      </div>
      <div class="day-toggle-right">
        ${summary ? `<span class="day-toggle-scores">${summary}</span>` : ''}
        <span class="day-chevron${openCls}" id="chev-${id}">▼</span>
      </div>
    </button>
    <div class="day-body${openCls}" id="${id}">
      ${matches.map(matchCard).join('')}
    </div>
  </div>`;
}

function toggleDay(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

/* ══════════════════════════════════════════
   RENDER: HOY
══════════════════════════════════════════ */
function renderHoy() {
  const today = todayStr();
  const d = new Date();
  const todayMatches = allMatches.filter(m => dateStr(m.utcDate) === today);

  let html = `<div class="hoy-date">${DAYS_ES[d.getDay()].toUpperCase()} ${d.getDate()} DE ${MONTHS_ES[d.getMonth()].toUpperCase()}</div>`;

  if (!todayMatches.length) {
    // find next day with matches
    const future = allMatches.filter(m => dateStr(m.utcDate) > today);
    if (future.length) {
      const nextKey = dateStr(future[0].utcDate);
      const nextMatches = allMatches.filter(m => dateStr(m.utcDate) === nextKey);
      html += `<div class="hoy-sub">Sin partidos hoy · Próximos: ${formatDateLabel(nextKey)}</div>`;
      html += dayBlock(nextKey, nextMatches, true, false, 'hoy');
    } else {
      html += `<div class="empty">No hay más partidos programados</div>`;
    }
  } else {
    const live   = todayMatches.filter(m => m.status === 'IN_PLAY' || m.status === 'PAUSED');
    const upcoming = todayMatches.filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED');
    const done   = todayMatches.filter(m => m.status === 'FINISHED');
    html += `<div class="hoy-sub">${todayMatches.length} partido${todayMatches.length!==1?'s':''} hoy</div>`;
    if (live.length) {
      html += `<div class="section-label" style="margin-top:0;color:var(--red);">⬤ En vivo</div>`;
      live.forEach(m => { html += matchCard(m); });
    }
    if (upcoming.length) {
      html += `<div class="section-label" ${live.length?'':'style="margin-top:0;"'}>Por jugar</div>`;
      upcoming.forEach(m => { html += matchCard(m); });
    }
    if (done.length) {
      html += `<div class="section-label">Finalizados</div>`;
      done.forEach(m => { html += matchCard(m); });
    }
  }
  document.getElementById('hoy-content').innerHTML = html;
}

/* ══════════════════════════════════════════
   RENDER: CALENDARIO
══════════════════════════════════════════ */
function renderCalendario() {
  const today = todayStr();
  const byDate = {};
  allMatches.forEach(m => {
    const k = dateStr(m.utcDate);
    if (!byDate[k]) byDate[k] = [];
    byDate[k].push(m);
  });
  let html = '';
  Object.keys(byDate).sort().forEach(date => {
    html += dayBlock(date, byDate[date], date === today, date === today, 'cal');
  });
  document.getElementById('cal-content').innerHTML = html || '<div class="empty">Sin datos</div>';
}

/* ══════════════════════════════════════════
   RENDER: RESULTADOS
══════════════════════════════════════════ */
function renderResultados() {
  const done = allMatches.filter(m => m.status === 'FINISHED');
  if (!done.length) {
    document.getElementById('res-content').innerHTML = '<div class="empty">Aún no hay resultados</div>';
    return;
  }
  const byDate = {};
  done.forEach(m => {
    const k = dateStr(m.utcDate);
    if (!byDate[k]) byDate[k] = [];
    byDate[k].push(m);
  });
  let html = '';
  Object.keys(byDate).sort().reverse().forEach((date, i) => {
    html += dayBlock(date, byDate[date], i === 0, false, 'res');
  });
  document.getElementById('res-content').innerHTML = html;
}

/* ══════════════════════════════════════════
   RENDER: GRUPOS
══════════════════════════════════════════ */
function renderGrupos() {
  if (!standings.length) {
    document.getElementById('grupos-content').innerHTML = '<div class="empty">Sin datos de clasificación</div>';
    return;
  }
  let html = '';
  standings.forEach(group => {
    const name = group.group ? group.group.replace('GROUP_','GRUPO ') : group.stage;
    html += `<div class="grupo-card">
      <div class="grupo-header">
        <span class="grupo-name">${name}</span>
        <span style="font-size:9px;color:var(--text3);">J · G · E · P · DG · PTS</span>
      </div>
      <table class="grupo-table"><tbody>`;
    group.table.forEach((row, i) => {
      const qualify = i < 2;
      const dg = row.goalsFor - row.goalsAgainst;
      const f = flag(row.team?.tla || '');
      html += `<tr class="${qualify ? 'qualify' : ''}">
        <td><div class="team-cell">
          <span class="pos">${i+1}</span>
          <span class="flag-sm">${f}</span>
          <span class="t-name">${row.team?.shortName || row.team?.name || '—'}</span>
        </div></td>
        <td>${row.playedGames}</td>
        <td>${row.won}</td>
        <td>${row.draw}</td>
        <td>${row.lost}</td>
        <td style="color:${dg>0?'var(--green)':dg<0?'var(--red)':'var(--text2)'};">${dg>0?'+':''}${dg}</td>
        <td class="pts">${row.points}</td>
      </tr>`;
    });
    html += `</tbody></table>
      <div class="qualify-note">✓ Clasifican top 2 · 8 mejores terceros también avanzan</div>
    </div>`;
  });
  document.getElementById('grupos-content').innerHTML = html;
}

/* ══════════════════════════════════════════
   FETCH + REFRESH
══════════════════════════════════════════ */
function setStatus(state, msg) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className = 'status-dot' + (state === 'ok' ? '' : state === 'err' ? ' err' : ' load');
  text.textContent = msg;
}

function setLoading(on) {
  const btn  = document.getElementById('refresh-btn');
  const spin = document.getElementById('spin-icon');
  btn.classList.toggle('loading', on);
  spin.textContent = on ? '⟳' : '↻';
  btn.disabled = on;
}

async function refreshAll() {
  setLoading(true);
  setStatus('load', 'Conectando con football-data.org…');
  try {
    // Fetch matches (all group stage)
    const mData = await apiFetch(`/competitions/${WC_ID}/matches?season=2026`);
    allMatches = (mData.matches || []).sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate));

    // Fetch standings
    const sData = await apiFetch(`/competitions/${WC_ID}/standings?season=2026`);
    standings = sData.standings || [];

    lastUpdate = new Date();
    const timeStr = lastUpdate.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
    setStatus('ok', `Actualizado ${timeStr} · ${_remaining} requests restantes`);

    renderAll();
  } catch(e) {
    setStatus('err', `Error: ${e.message} — datos pueden estar desactualizados`);
    // if we have cached data still render it
    if (allMatches.length) renderAll();
  } finally {
    setLoading(false);
  }
}

function renderAll() {
  renderHoy();
  renderCalendario();
  renderResultados();
  renderGrupos();
}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
refreshAll();
</script>
</body>
</html>
